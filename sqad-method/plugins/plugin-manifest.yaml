# SQAD-Public Plugin Manifest
# Auto-generated by /setup and /refresh when scanning plugins/ directory
#
# Each plugin has a plugin.yaml defining:
#   - name, version, description
#   - provides: fragments, rubric_modules, agents
#   - load_when: conditions for loading
#   - requires: min_version compatibility
#
# Example plugin structure:
#
#   plugins/
#   ├── plugin-manifest.yaml      (this file)
#   ├── my-company-conventions/
#   │   ├── plugin.yaml
#   │   ├── fragments/
#   │   ├── rubric/
#   │   └── agents/
#   └── graphql-patterns/
#       ├── plugin.yaml
#       └── fragments/graphql.md

plugins: []
