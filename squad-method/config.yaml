# SQUAD-Public Configuration — generated by /setup
# Run /setup to configure, or edit manually.
# Docs: https://github.com/adityashubham1997/squad-public#configuration-reference

# --- Company & Project ---
company:
  name: ""                      # e.g., "Acme Corp"
  domain: ""                    # e.g., fintech, healthcare, e-commerce, saas, gaming
  compliance: []                # Valid: [soc2, hipaa, pci-dss, gdpr, iso27001]

project:
  name: ""                      # e.g., "Widget Platform"
  description: ""               # One-line summary for agent context
  type: ""                      # Valid: web-app | api | library | cli | mobile | infra | monorepo | game | ai-ml | data-pipeline
  maturity: ""                  # Valid: greenfield | brownfield | migration

# --- Team & User ---
team:
  name: ""                      # e.g., "Platform Team"
user:
  name: ""                      # REQUIRED — agents reference this in all communications
  role: ""                      # e.g., "Senior Engineer", "Tech Lead", "Intern"

# --- Git Host ---
github:
  host: "github.com"
  org: ""
  default_branch: "main"

# --- Stack (auto-detected by /setup — override here if needed) ---
stack:
  languages: []                 # Auto: [javascript, typescript, python, java, kotlin, go, rust, ruby, csharp, c, cpp, swift]
  frameworks: []                # Auto: [react, nextjs, express, django, spring, fastapi, angular, vue, svelte, android, ios, ionic, langchain, prisma, ...]
  build_tools: []               # Auto: [npm, yarn, pnpm, maven, gradle, cargo, pip, dotnet, cmake, bundler]
  test_frameworks: []           # Auto: [jest, mocha, vitest, playwright, cypress, pytest, junit, xunit, rspec]
  test_command: "npm test"      # Command agents run to execute tests
  build_command: ""             # Command agents run to build
  lint_command: "npm run lint"  # Command agents run for linting

# --- Cloud (auto-detected by /setup — override here if needed) ---
cloud:
  providers: []                 # Auto: [aws, gcp, azure]
  iac: []                       # Auto: [terraform, cdk, pulumi, ansible]
  container: []                 # Auto: [docker, kubernetes]
  ci_cd: []                     # Auto: [github-actions, gitlab-ci, jenkins, circleci, azure-devops]
  monitoring: []                # Auto: [datadog, prometheus, grafana, newrelic, sentry, opentelemetry]

# --- Issue Tracker ---
tracker:
  type: ""                      # Auto-detected. Valid: jira | linear | shortcut | notion | github-issues
  project_key: ""               # e.g., "PROJ" (Jira project key)
  api_url: ""                   # e.g., "https://acme.atlassian.net" (Jira base URL)
  board_url: ""                 # Sprint board URL (e.g., "https://acme.atlassian.net/jira/software/projects/PROJ/boards/1")
  mcp_available: false          # Set true if MCP tracker integration is configured

# --- Context Files ---
context_files:
  canonical: "CONTEXT.md"
  copies: ["CLAUDE.md", "GEMINI.md", "AGENTS.md"]

# --- Repos (populated by /refresh) ---
repos: []

# --- Knowledge Graph ---
knowledge_graph:
  enabled: true
  auto_rebuild: true
  include_in_context_file: true

# --- Model Routing (drives router/index.js decisions) ---
model_routing:
  default: "default"           # Model tier: fast | default | heavy
  mode: "balanced"             # balanced | quality (always heavy) | budget (always fast)
  execution_path: "auto"       # auto | agent_tool | cli | sequential
                               # auto = detect Path A/B/C at runtime
  agent_overrides: {}          # e.g., { raven: heavy, scribe: fast }
  phase_overrides: {}          # e.g., { phase_6: fast }
  effort_overrides: {}         # e.g., { raven: high, scribe: low }
  complexity_upgrade:
    enabled: true
    blast_radius_threshold: 20 # KG degree above which → auto-upgrade to heavy
  budget:
    max_heavy_agents_per_phase: 3
  fallback: "default"          # If heavy unavailable → use this tier

# --- Quality Gate (V2 — passive until calibrated) ---
quality_gate:
  enabled: false               # Flip to true after 20-30 completions
  min_signals_to_escalate: 2   # Number of quality signals before re-dispatch
  max_escalations_per_agent: 1 # Circuit breaker — never escalate more than N times

# --- Learned Classifier (V3 — stub until trained) ---
classifier:
  enabled: false               # Requires ~500 labelled completions
  endpoint: ""                 # HTTP endpoint for trained classifier
  training_data: "squad-method/output/tracking.jsonl"

# --- Agents ---
agents:
  built_in: 27
  custom: []

# --- Plugins ---
plugins: []

# --- IDEs ---
# All supported: claude, windsurf, cursor, codex, kiro, gemini, antigravity
# /setup auto-detects which are installed; override here if needed
ides:
  installed: ["claude", "windsurf", "cursor", "codex", "kiro", "gemini", "antigravity"]

# --- Communication ---
communication_language: "English"
